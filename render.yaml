services:
  - type: web
    name: rentwise-ai-api
    runtime: node
    region: singapore
    plan: starter
    rootDir: backend
    buildCommand: npm ci && npm run prisma:generate && npm run build
    preDeployCommand: npm run prisma:migrate
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: rentwise-ai-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://rentwise-ai-web.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CAPTCHA_SECRET
        generateValue: true
      - key: MASTER_ADMIN_NAME
        value: RentWise Master Admin
      - key: MASTER_ADMIN_EMAIL
        sync: false
      - key: MASTER_ADMIN_PASSWORD
        sync: false
      - key: BCRYPT_ROUNDS
        value: 12
      - key: MAX_FILE_SIZE
        value: 52428800

  - type: web
    name: rentwise-ai-web
    runtime: node
    region: singapore
    plan: starter
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      # Change this after first deploy if Render assigns a different API URL.
      - key: NEXT_PUBLIC_API_URL
        value: https://rentwise-ai-api.onrender.com/api

databases:
  - name: rentwise-ai-db
    databaseName: rentwise_ai
    user: rentwise
    region: singapore
    plan: basic-256mb
