version: '3.8'

services:
  db:
    image: postgres:15
    container_name: rentwise_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rentwise_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/rentwise_ai?schema=public
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-refresh-secret-in-production}
      MASTER_ADMIN_EMAIL: ${MASTER_ADMIN_EMAIL:-master@rentwise.ai}
      MASTER_ADMIN_PASSWORD: ${MASTER_ADMIN_PASSWORD:-ChangeMeBeforeDeploying!}
      CAPTCHA_SECRET: ${CAPTCHA_SECRET:-change-this-captcha-secret}
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
